name: Send Mail Scheduler (IST)

on:
  schedule:
    # Every 20 minutes, 24 hours a day
    - cron: "*/20 * * * *"
  workflow_dispatch: # allow manual run too

# Prevent overlapping runs
concurrency:
  group: send-mail-scheduler
  cancel-in-progress: true

jobs:
  send-mail:
    runs-on: ubuntu-latest
    environment: Cronjob
    env:
      # Load secrets into environment variables
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      CLIENT_ID: ${{ secrets.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      REDIRECT_URI: ${{ secrets.REDIRECT_URI }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
      APP_PASSWORD_ENCRYPTION_KEY: ${{ secrets.APP_PASSWORD_ENCRYPTION_KEY }}
      NODE_ENV: Cronjob

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run sendMail script
        run: npx tsx scripts/sendMail.ts
